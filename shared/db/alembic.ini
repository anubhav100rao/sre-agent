# Alembic configuration for the agents database (postgres-agents).
# Used by: shared/db/migrations/env.py
#
# Run with: alembic -c shared/db/alembic.ini upgrade head
# From repository root.

[alembic]
script_location = shared/db/migrations
# URL is overridden at runtime by env.py via settings
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/agents

file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
prepend_sys_path = .

[post_write_hooks]

[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
