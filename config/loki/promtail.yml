# Promtail configuration for SRE Agent Swarm
# Ships Docker container logs to Loki with service-level labels.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ── Docker container logs ──────────────────────────────────────────────
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          # Only scrape containers on our network
          - name: network
            values: ["sre-net"]
    relabel_configs:
      # Use container name as the service label
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: service
      # Keep the container_id for correlation with traces
      - source_labels: ["__meta_docker_container_id"]
        target_label: container_id
      # Add compose project label
      - source_labels:
          ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: compose_project

    pipeline_stages:
      # Attempt JSON parsing (structlog services emit JSON logs)
      - json:
          expressions:
            level: level
            timestamp: "timestamp"
            service: service
            correlation_id: correlation_id

      # Map JSON level → Loki level label
      - labels:
          level:
          service:

      # Parse timestamp if present
      - timestamp:
          source: timestamp
          format: RFC3339
          fallback_formats:
            - "2006-01-02T15:04:05Z07:00"
