# AlertManager configuration for SRE Agent Swarm
# Fires alerts to a webhook receiver (local stub).
# Phase 3 will wire this to the Safety Agent's human-approval gateway.

global:
  # How long to wait before re-sending a resolved alert
  resolve_timeout: 5m

# ── Routing ───────────────────────────────────────────────────────────────
route:
  # Default receiver
  receiver: webhook-default

  # Group alerts by service so one notification fires per service outage
  group_by: ["alertname", "job"]
  group_wait: 10s # wait before firing (collects related alerts)
  group_interval: 5m # how often to re-fire if still active
  repeat_interval: 3h # how often to re-notify if already sent

  routes:
    # Critical alerts go immediately to PagerDuty stub (Phase 3)
    - receiver: webhook-critical
      match:
        severity: critical
      continue: false

    # Warning alerts go to the default webhook
    - receiver: webhook-default
      match:
        severity: warning

# ── Receivers ─────────────────────────────────────────────────────────────
receivers:
  # Default — stub webhook (logs to console; Phase 3 wires to Safety Agent)
  - name: webhook-default
    webhook_configs:
      - url: "http://localhost:8099/alerts" # replaced by agent endpoint in Phase 3
        send_resolved: true
        http_config:
          follow_redirects: true

  # Critical — same stub but separate for future escalation logic
  - name: webhook-critical
    webhook_configs:
      - url: "http://localhost:8099/alerts/critical"
        send_resolved: true

# ── Inhibition rules ──────────────────────────────────────────────────────
inhibit_rules:
  # If ServiceDown fires, silence HighErrorRate + HighLatency for same job
  - source_match:
      alertname: ServiceDown
    target_match_re:
      alertname: "HighErrorRate|HighLatencyP99"
    equal: ["job"]
