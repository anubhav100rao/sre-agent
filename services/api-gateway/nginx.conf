# ===========================================================================
# Nginx API Gateway Configuration
# ===========================================================================
# Routes all external traffic from port 8000 to the appropriate microservice.
# Each upstream block corresponds to a Docker Compose service name.
# ===========================================================================

events {
    worker_connections 1024;
}

http {
    # -------------------------------------------------------------------------
    # Shared settings
    # -------------------------------------------------------------------------
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain application/json;

    # Timeouts (generous for Phase 1)
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # Propagate real client IP downstream
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # -------------------------------------------------------------------------
    # Upstreams (Docker Compose service names resolve via Docker DNS)
    # -------------------------------------------------------------------------
    upstream user_svc {
        server user-svc:8001;
    }

    upstream auth_svc {
        server auth-svc:8004;
    }

    upstream order_svc {
        server order-svc:8002;
    }

    upstream payment_svc {
        server payment-svc:8005;
    }

    upstream product_svc {
        server product-svc:8003;
    }

    upstream search_svc {
        server search-svc:8006;
    }

    upstream dashboard_api {
        server dashboard-api:8010;
    }

    upstream dashboard_frontend {
        server dashboard-frontend:3001;
    }

    # -------------------------------------------------------------------------
    # Main virtual server — :8000
    # -------------------------------------------------------------------------
    server {
        listen 8000;
        server_name _;

        # --- Gateway health check --- #
        location /health {
            return 200 '{"status":"healthy","service":"api-gateway","version":"0.1.0"}';
            add_header Content-Type application/json;
        }

        # --- Authentication --- #
        location /auth/ {
            proxy_pass http://auth_svc/auth/;
        }

        # --- Users --- #
        location /users/ {
            proxy_pass http://user_svc/users/;
        }

        # --- Orders --- #
        location /orders/ {
            proxy_pass http://order_svc/orders/;
        }

        # --- Payments --- #
        location /payments/ {
            proxy_pass http://payment_svc/payments/;
        }

        # --- Products --- #
        location /products/ {
            proxy_pass http://product_svc/products/;
        }

        # --- Search --- #
        location /search/ {
            proxy_pass http://search_svc/search/;
            # Don't strip trailing slash for search routes
        }

        # --- Internal metrics (not proxied publicly in production) --- #
        location /internal/metrics/user {
            proxy_pass http://user_svc/metrics;
        }
        location /internal/metrics/order {
            proxy_pass http://order_svc/metrics;
        }
        location /internal/metrics/payment {
            proxy_pass http://payment_svc/metrics;
        }
        location /internal/metrics/product {
            proxy_pass http://product_svc/metrics;
        }
        location /internal/metrics/search {
            proxy_pass http://search_svc/metrics;
        }

        # --- Dashboard API --- #
        location /api/dashboard/ {
            proxy_pass http://dashboard_api/api/;
        }

        # --- Dashboard WebSocket --- #
        location /dashboard/ws {
            proxy_pass http://dashboard_api/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # --- Dashboard Frontend --- #
        location /dashboard/ {
            proxy_pass http://dashboard_frontend/;
        }

        # --- Default 404 --- #
        location / {
            return 404 '{"error":"route not found"}';
            add_header Content-Type application/json;
        }
    }
}
